name: News Bot

on:
  schedule:
    - cron: '30 22 * * 0-4'  # 한국시간 오전 7시 30분 (월-금)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 라이브러리 설치
        run: |
          pip install feedparser newspaper3k lxml_html_clean googlenewsdecoder langdetect sumy matplotlib transformers beautifulsoup4 nltk

      - name: 뉴스 봇 실행
        run: python news_bot.py

      - name: 결과 저장
        run: |
          ls -al
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "update news" || echo "No changes"
          git push --force
